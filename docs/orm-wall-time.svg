<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" width="700" height="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="700" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a2e">ORM Wall Time per Run (minutes)</text>

  <!-- Y axis labels and grid -->
  <!-- Prisma -->
  <text x="80" y="80" text-anchor="end" font-size="13" fill="#333" font-weight="500">Prisma</text>
  <line x1="90" y1="75" x2="650" y2="75" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Drizzle -->
  <text x="80" y="130" text-anchor="end" font-size="13" fill="#333" font-weight="500">Drizzle</text>
  <line x1="90" y1="125" x2="650" y2="125" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Kysely -->
  <text x="80" y="180" text-anchor="end" font-size="13" fill="#333" font-weight="500">Kysely</text>
  <line x1="90" y1="175" x2="650" y2="175" stroke="#e8e8e8" stroke-width="1"/>
  <!-- TypeORM -->
  <text x="80" y="230" text-anchor="end" font-size="13" fill="#333" font-weight="500">TypeORM</text>
  <line x1="90" y1="225" x2="650" y2="225" stroke="#e8e8e8" stroke-width="1"/>

  <!-- X axis: scale 0-40 minutes, 90px = 0min, 650px = 40min => 14px per minute -->
  <!-- X axis labels -->
  <text x="90" y="270" text-anchor="middle" font-size="11" fill="#888">0</text>
  <line x1="90" y1="55" x2="90" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="230" y="270" text-anchor="middle" font-size="11" fill="#888">10</text>
  <line x1="230" y1="55" x2="230" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="370" y="270" text-anchor="middle" font-size="11" fill="#888">20</text>
  <line x1="370" y1="55" x2="370" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="510" y="270" text-anchor="middle" font-size="11" fill="#888">30</text>
  <line x1="510" y1="55" x2="510" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="650" y="270" text-anchor="middle" font-size="11" fill="#888">40</text>
  <line x1="650" y1="55" x2="650" y2="250" stroke="#e0e0e0" stroke-width="0.5"/>


  <!-- Prisma: runs at 15.6, 17.4, 11.9 — mean 14.9, range 11.9–17.4 -->
  <!-- x = 90 + (val * 14) -->
  <line x1="256.6" y1="75" x2="333.6" y2="75" stroke="#4a90d9" stroke-width="2" opacity="0.5"/>
  <circle cx="308.4" cy="75" r="5" fill="#4a90d9" opacity="0.7"/>
  <circle cx="333.6" cy="75" r="5" fill="#4a90d9" opacity="0.7"/>
  <circle cx="256.6" cy="75" r="5" fill="#4a90d9" opacity="0.7"/>
  <!-- Mean marker -->
  <line x1="298.6" y1="68" x2="298.6" y2="82" stroke="#4a90d9" stroke-width="2.5"/>
  <text x="341" y="80" font-size="11" fill="#4a90d9" font-weight="500">14.9m</text>

  <!-- Drizzle: runs at 17.7, 16.0, 14.5 — mean 16.0, range 14.5–17.7 -->
  <line x1="293" y1="125" x2="337.8" y2="125" stroke="#2ecc71" stroke-width="2" opacity="0.5"/>
  <circle cx="337.8" cy="125" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="314" cy="125" r="5" fill="#2ecc71" opacity="0.7"/>
  <circle cx="293" cy="125" r="5" fill="#2ecc71" opacity="0.7"/>
  <!-- Mean marker -->
  <line x1="314" y1="118" x2="314" y2="132" stroke="#2ecc71" stroke-width="2.5"/>
  <text x="345" y="130" font-size="11" fill="#2ecc71" font-weight="500">16.0m</text>

  <!-- Kysely: runs at 15.1, 11.7, 19.8 — mean 15.6, range 11.7–19.8 -->
  <line x1="253.8" y1="175" x2="367.2" y2="175" stroke="#e67e22" stroke-width="2" opacity="0.5"/>
  <circle cx="301.4" cy="175" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="253.8" cy="175" r="5" fill="#e67e22" opacity="0.7"/>
  <circle cx="367.2" cy="175" r="5" fill="#e67e22" opacity="0.7"/>
  <!-- Mean marker -->
  <line x1="308.4" y1="168" x2="308.4" y2="182" stroke="#e67e22" stroke-width="2.5"/>
  <text x="375" y="180" font-size="11" fill="#e67e22" font-weight="500">15.6m</text>

  <!-- TypeORM: runs at 34.6, 31.5 — mean 33.1, range 31.5–34.6 -->
  <line x1="531" y1="225" x2="574.4" y2="225" stroke="#e74c3c" stroke-width="2" opacity="0.5"/>
  <circle cx="574.4" cy="225" r="5" fill="#e74c3c" opacity="0.7"/>
  <circle cx="531" cy="225" r="5" fill="#e74c3c" opacity="0.7"/>
  <!-- Mean marker -->
  <line x1="553.4" y1="218" x2="553.4" y2="232" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="582" y="230" font-size="11" fill="#e74c3c" font-weight="500">33.1m</text>

  <!-- Legend -->
  <circle cx="160" cy="290" r="4" fill="#666" opacity="0.7"/>
  <text x="170" y="293" font-size="10" fill="#888">individual run</text>
  <line x1="230" y1="290" x2="244" y2="290" stroke="#666" stroke-width="2.5"/>
  <text x="250" y="293" font-size="10" fill="#888">mean</text>
  <line x1="290" y1="290" x2="316" y2="290" stroke="#666" stroke-width="2" opacity="0.5"/>
  <text x="322" y="293" font-size="10" fill="#888">range</text>
</svg>
